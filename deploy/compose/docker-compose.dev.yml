services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: octo_agent_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    depends_on:
      - mysql
    ports:
      - "8080:8080"

  api-front:
    build:
      context: ../..
      dockerfile: deploy/docker/frontend.Dockerfile
    depends_on:
      - backend
    command: npm run dev:api-front
    ports:
      - "3000:3000"

  admin-front:
    build:
      context: ../..
      dockerfile: deploy/docker/frontend.Dockerfile
    depends_on:
      - backend
    command: npm run dev:admin-front
    ports:
      - "3001:3001"

volumes:
  mysql_data:
