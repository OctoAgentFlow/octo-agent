# WARNING: Production API config.
# TODO: Before production deployment, replace all TODO_* values in private server config.

api:
  host: "0.0.0.0"
  port: 12001
mysql:
  # Production API database is configured to use the shared RDS octo_prod schema.
  # Keep this pointed at octo_prod; never use this config for test deployments.
  data_source: "TODO_MYSQL_DSN"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 3600
  max_idletime: 1800
log:
  level: "info"
  encoding: "json"
  api_output_path: "logs/api-prod.log"
  admin_output_path: "logs/admin-prod.log"
  max_size: 100
  max_backups: 30
  max_age: 14
  compress: true
alert:
  enabled: true
  environment: "prod"
  lark:
    webhook_url: ""
    secret: ""
  rate_limit:
    dedupe_window_seconds: 300
    max_per_minute: 10
  levels:
    critical: true
    error: true
    warning: true
    info: false
email:
  provider: "resend"
  local:
    expose_code: false
  resend:
    # TODO: Set RESEND_API_KEY in backend/configs/.env or server environment.
    api_key: ""
    # TODO: Confirm this sender is verified in Resend before production launch.
    from_email: "Octo Agent <no-reply@mail.octo-agent.com>"
  ses:
    region: "ap-southeast-1"
    access_key_id: ""
    secret_access_key: ""
    from_email: "no-reply@mail.octo-agent.com"

app:
  frontend_base_url: "https://octo-agent.com"
  official_x_url: "https://x.com/octo_agent_flow"
  telegram_url: "https://t.me/+79oSyfuh6C80NDU1"

jwt:
  # Production requires a stable random secret shared by API and Admin API.
  # Prefer setting JWT_SECRET in the server environment or private config.
  secret: "TODO_PROD_JWT_SECRET"
  access_expire_seconds: 7200
  refresh_expire_seconds: 2592000

x_oauth:
  client_id: "TODO_X_CLIENT_ID"
  client_secret: "TODO_X_CLIENT_SECRET"
  redirect_uri: "https://octo-agent.com/api/v1/accounts/oauth/x/callback"
  state_secret: "TODO_X_STATE_SECRET"
  scopes: "tweet.read tweet.write users.read dm.read dm.write offline.access"

x_publisher:
  # Production real publishing is enabled. Keep manual controls and rate limits conservative.
  real_publish_enabled: true
  manual_publish_enabled: true
  per_account_daily_limit: 20
  per_account_min_interval_seconds: 300
  dry_run: false

x_trends:
  enabled: true
  bearer_token: ""
  interval_hours: 12
  max_trends: 20
  retention_days: 14
  regions:
    - woeid: "1"
      name: "Worldwide"
    - woeid: "23424977"
      name: "United States"

llm:
  default_provider: "openai"
  openai:
    api_key: ""
    model: "gpt-4.1-mini"
    base_url: "https://api.openai.com/v1"
    timeout_sec: 20
    max_tokens: 120
    temperature: 0.65

billing:
  order_ttl_minutes: 30
  scanner:
    enabled: true
    interval_seconds: 60
    max_orders_per_tick: 100
    block_lookback: 7200
  webhook_secret: "TODO_BILLING_WEBHOOK_SECRET"
  rpc_urls:
    "56": ""
    "1": ""
    "728126428": ""
  wss_urls:
