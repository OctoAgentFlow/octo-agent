# DEPRECATED: Test environment servers have been released. Keep this file only for
# historical compatibility and config-path unit tests; do not use it for server deployment.
# Use config.prod.admin.yaml for current server development.

admin:
  host: "0.0.0.0"
  port: 11002
mysql:
  # Test Admin API database is configured to use the shared RDS octo_test schema.
  # Keep this pointed at octo_test; do not use octo_prod for test deployments.
  data_source: "TODO_MYSQL_DSN"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 3600
  max_idletime: 1800
log:
  level: "debug"
  encoding: "json"
  api_output_path: "logs/api.log"
  admin_output_path: "logs/admin.log"
  max_size: 100
  max_backups: 30
  max_age: 7
  compress: true
alert:
  enabled: true
  environment: "test"
  lark:
    webhook_url: ""
    secret: ""
  rate_limit:
    dedupe_window_seconds: 300
    max_per_minute: 10
  levels:
    critical: true
    error: true
    warning: true
    info: false
email:
  provider: "resend"
  local:
    expose_code: false
  resend:
    # Test environment sends real verification emails through Resend.
    api_key: ""
    from_email: "Octo Agent <no-reply@mail.octo-agent.com>"
  ses:
    region: "ap-southeast-1"
    # TODO: SES is kept only as a compatibility provider. Do not commit real AWS keys.
    access_key_id: ""
    secret_access_key: ""
    from_email: "no-reply@mail.octo-agent.com"

app:
  frontend_base_url: "https://test.octo-agent.com"

jwt:
  # TEST-ONLY stable JWT secret. Keep api/admin-api identical so restarts do not invalidate sessions.
  # TODO: Before production, move JWT secrets to server private config or secret manager.
  secret: ""
  access_expire_seconds: 7200
  refresh_expire_seconds: 2592000

admin_auth:
  emails:
    - "owner@example.com"
    - "ops@example.com"
  code_ttl_seconds: 300

