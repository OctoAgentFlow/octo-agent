name: Bug report
description: Report a reproducible problem in OctoAgentFlow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OctoAgentFlow. Please remove secrets, tokens, private endpoints, and user data before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend API
        - Scheduler / jobs
        - Billing
        - Documentation
        - GitHub Pages website
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node.js, Go, database, or deployment context.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Add screenshots or sanitized logs if helpful.
