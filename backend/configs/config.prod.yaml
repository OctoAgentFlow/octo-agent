# WARNING: Production compatibility config.
# Prefer config.prod.api.yaml and config.prod.admin.yaml with APP_SERVICE.
# TODO: Before production deployment, replace all TODO_* values in private server config.

api:
  host: "0.0.0.0"
  port: 12001
admin:
  host: "0.0.0.0"
  port: 12002
mysql:
  # Production compatibility database is configured to use the shared RDS octo_prod schema.
  # Keep this pointed at octo_prod; never use this config for test deployments.
  data_source: "TODO_MYSQL_DSN"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 3600
  max_idletime: 1800
log:
  level: "info"
  encoding: "json"
  api_output_path: "logs/api-prod.log"
  admin_output_path: "logs/admin-prod.log"
  max_size: 100
  max_backups: 30
  max_age: 14
  compress: true
email:
  provider: "resend"
  local:
    expose_code: false
  resend:
    # TODO: Set RESEND_API_KEY in backend/configs/.env or server environment.
    api_key: ""
    # TODO: Confirm this sender is verified in Resend before production launch.
    from_email: "Octo Agent <no-reply@mail.octo-agent.com>"
  ses:
    region: "ap-southeast-1"
    access_key_id: ""
    secret_access_key: ""
    from_email: "no-reply@mail.octo-agent.com"

app:
  frontend_base_url: "https://octo-agent.com"

x_oauth:
  client_id: "TODO_X_CLIENT_ID"
  client_secret: "TODO_X_CLIENT_SECRET"
  redirect_uri: "https://octo-agent.com/api/v1/accounts/oauth/x/callback"
  state_secret: "TODO_X_STATE_SECRET"

billing:
  order_ttl_minutes: 30
  webhook_secret: "TODO_BILLING_WEBHOOK_SECRET"
  rpc_urls:
    "56": "TODO_BSC_RPC_URL"
  payment_methods:
    - method: "USDT"
      network: "BEP20"
      chain_id: 56
      token_address: "TODO_TOKEN_ADDRESS"
      receiver_address: "TODO_RECEIVER_ADDRESS"
      decimals: 18
      is_default: true
      note: "推荐使用 BEP20，手续费更低"
  plans:
    basic_monthly:
      name: "Basic"
      amount: "10"
      currency: "USDT"
      period_days: 30
      description: "Full automation for one month."
      features:
        - "Auto Post + Auto Reply + Auto DM"
        - "Priority queue"
