# WARNING: Test environment config only. Do not use for production.
# TODO: Before production, move secrets to server private config or secret manager.

api:
  host: "0.0.0.0"
  port: 11001
admin:
  host: "0.0.0.0"
  port: 11002
mysql:
  # Test compatibility database is configured to use the shared RDS octo_test schema.
  # Keep this pointed at octo_test; do not use octo_prod for test deployments.
  data_source: "TODO_MYSQL_DSN"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 3600
  max_idletime: 1800
log:
  level: "debug"
  encoding: "json"
  api_output_path: "logs/api.log"
  admin_output_path: "logs/admin.log"
  max_size: 100
  max_backups: 30
  max_age: 7
  compress: true
alert:
  enabled: true
  environment: "test"
  lark:
    webhook_url: ""
    secret: ""
  rate_limit:
    dedupe_window_seconds: 300
    max_per_minute: 10
  levels:
    critical: true
    error: true
    warning: true
    info: false
email:
  provider: "resend"
  local:
    expose_code: false
  resend:
    # Test environment sends real verification emails through Resend.
    api_key: ""
    from_email: "Octo Agent <no-reply@mail.octo-agent.com>"
  ses:
    region: "ap-southeast-1"
    # TODO: SES is kept only as a compatibility provider. Do not commit real AWS keys.
    access_key_id: ""
    secret_access_key: ""
    from_email: "no-reply@mail.octo-agent.com"

app:
  frontend_base_url: "https://test.octo-agent.com"

admin_auth:
  emails:
    - "owner@example.com"
    - "ops@example.com"
  code_ttl_seconds: 300

x_oauth:
  client_id: "TODO_X_CLIENT_ID"
  client_secret: ""
  redirect_uri: "https://test.octo-agent.com/api/v1/accounts/oauth/x/callback"
  state_secret: ""
  scopes: "tweet.read users.read offline.access"

x_publisher:
  # Test real publishing is enabled for X integration verification.
  real_publish_enabled: true
  manual_publish_enabled: true
  per_account_daily_limit: 1
  per_account_min_interval_seconds: 300
  dry_run: false

billing:
  order_ttl_minutes: 30
  scanner:
    enabled: true
    interval_seconds: 60
    max_orders_per_tick: 100
    block_lookback: 7200
  webhook_secret: "TODO_BILLING_WEBHOOK_SECRET"
  rpc_urls:
    "56": ""
    "1": ""
    "728126428": ""
  wss_urls:
    "56": ""
    "1": ""
  explorer_api_keys:
    etherscan: ""
  payment_methods:
    - method: "USDT"
      network: "BEP20"
      chain_id: 56
      token_address: "TODO_TOKEN_ADDRESS"
      receiver_address: "TODO_RECEIVER_ADDRESS"
      decimals: 18
      is_default: true
      note: "推荐使用 BEP20，手续费更低"
    - method: "USDT"
      network: "ERC20"
      chain_id: 1
      token_address: "TODO_TOKEN_ADDRESS"
      receiver_address: "TODO_RECEIVER_ADDRESS"
      decimals: 6
      is_default: false
      note: "ERC20 主网 USDT，适合从以太坊主网付款"
    - method: "USDT"
      network: "TRC20"
      chain_id: 728126428
      token_address: "TODO_TOKEN_ADDRESS"
      receiver_address: "TODO_RECEIVER_ADDRESS"
      decimals: 6
      is_default: false
      note: "TRC20 主网 USDT，手续费低；提交交易哈希后系统自动链上确认，无需人工审核"
  plans:
    basic_monthly:
      name: "Basic"
      amount: "8"
      currency: "USDT"
      period_days: 30
      description: "Full automation for one month."
      features:
        - "Auto Post + Auto Reply + Auto DM"
        - "Priority queue"
