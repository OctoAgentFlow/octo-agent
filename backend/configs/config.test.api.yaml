# WARNING: Test API config only. Do not use for production.
# TODO: Before production, move secrets to server private config or secret manager.

api:
  host: "0.0.0.0"
  port: 11001
mysql:
  # Test API database is configured to use the shared RDS octo_test schema.
  # Keep this pointed at octo_test; do not use octo_prod for test deployments.
  data_source: "TODO_MYSQL_DSN"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 3600
  max_idletime: 1800
log:
  level: "debug"
  encoding: "json"
  api_output_path: "logs/api.log"
  admin_output_path: "logs/admin.log"
  max_size: 100
  max_backups: 30
  max_age: 7
  compress: true
alert:
  enabled: true
  environment: "test"
  lark:
    webhook_url: ""
    secret: ""
  rate_limit:
    dedupe_window_seconds: 300
    max_per_minute: 10
  levels:
    critical: true
    error: true
    warning: true
    info: false
email:
  provider: "resend"
  local:
    expose_code: false
  resend:
    # Test environment sends real verification emails through Resend.
    api_key: ""
    from_email: "Octo Agent <no-reply@mail.octo-agent.com>"
  ses:
    region: "ap-southeast-1"
    # TODO: SES is kept only as a compatibility provider. Do not commit real AWS keys.
    access_key_id: ""
    secret_access_key: ""
    from_email: "no-reply@mail.octo-agent.com"

app:
  frontend_base_url: "https://test.octo-agent.com"
  official_x_url: "https://x.com/octo_agent_flow"
  telegram_url: "https://t.me/+79oSyfuh6C80NDU1"

jwt:
  # TEST-ONLY stable JWT secret. Keep api/admin-api identical so restarts do not invalidate sessions.
  # TODO: Before production, move JWT secrets to server private config or secret manager.
  secret: ""
  access_expire_seconds: 7200
  refresh_expire_seconds: 2592000

x_oauth:
  client_id: "TODO_X_CLIENT_ID"
  client_secret: ""
  redirect_uri: "https://test.octo-agent.com/api/v1/accounts/oauth/x/callback"
  state_secret: ""
  scopes: "tweet.read tweet.write users.read dm.read dm.write offline.access"

x_publisher:
  # Test real publishing is enabled for X integration verification.
  real_publish_enabled: true
  manual_publish_enabled: true
  per_account_daily_limit: 1
  per_account_min_interval_seconds: 300
  unlimited_user_emails:
    - "owner@example.com"
  unlimited_account_usernames:
    - "octo_agent_flow"
  dry_run: false

x_trends:
  enabled: true
  bearer_token: ""
  interval_hours: 12
  max_trends: 20
  retention_days: 14
  regions:
    - woeid: "1"
      name: "Worldwide"
    - woeid: "23424977"
      name: "United States"

llm:
  default_provider: "openai"
  openai:
    api_key: ""
    model: "gpt-4.1-mini"
    base_url: "https://api.openai.com/v1"
    timeout_sec: 20
    max_tokens: 120
    temperature: 0.65

