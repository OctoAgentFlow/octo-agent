api:
  host: "0.0.0.0"
  port: 10001
admin:
  host: "0.0.0.0"
  port: 10002
mysql:
  # 数据库配置： 用户名:密码@(ip:端口)/库名？超时设置
  data_source: "TODO_MYSQL_DSN"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 3600
  max_idletime: 1800
log:
  level: "debug"
  encoding: "json"
  api_output_path: "logs/api.log"
  admin_output_path: "logs/admin.log"
  max_size: 100
  max_backups: 30
  max_age: 7
  compress: true
email:
  provider: "local"
  local:
    expose_code: true
  resend:
    # TODO: Do not commit real API keys. Set RESEND_API_KEY in backend/configs/.env
    # or deployment environment variables when enabling provider: "resend".
    api_key: ""
    # TODO: Replace with a verified Resend sender domain/address for production.
    from_email: "Octo Agent <no-reply@mail.octo-agent.com>"
  ses:
    region: "ap-southeast-1"
    # TODO: SES is kept only as a compatibility provider. Do not commit real AWS keys.
    access_key_id: ""
    secret_access_key: ""
    from_email: "no-reply@mail.octo-agent.com"

# OAuth 完成后浏览器跳转到此前端 origin（与 api.port 无关）
app:
  frontend_base_url: "http://localhost:3000"

# X（Twitter）OAuth 2.0：在 Developer Portal 配置相同 redirect_uri / Callback URL
admin_auth:
  emails:
    - "owner@example.com"
    - "ops@example.com"
  code_ttl_seconds: 300

x_oauth:
  client_id: "TODO_X_CLIENT_ID"
  client_secret: "dDyI-ENvnsIPHhZRZqdZrn_Lti77OcjIkH9PCI6l51nO81p6VV"
  redirect_uri: "http://localhost:10001/api/v1/accounts/oauth/x/callback"
  state_secret: "T9@vQ7#kL2!zX5$M8^pR"
  scopes: "tweet.read users.read offline.access"

x_publisher:
  real_publish_enabled: false
  manual_publish_enabled: true
  per_account_daily_limit: 20
  per_account_min_interval_seconds: 300
  dry_run: true

billing:
  order_ttl_minutes: 30
  scanner:
    enabled: true
    interval_seconds: 60
    max_orders_per_tick: 100
    block_lookback: 7200
  webhook_secret: "local-billing-webhook-secret"
  rpc_urls:
    "56": "https://bsc-dataseed.binance.org"
    "1": "https://ethereum.publicnode.com"
    "728126428": "https://go.getblock.asia/66e67d066d504e3396ef2d4d6d43065b"
  payment_methods:
    - method: "USDT"
      network: "BEP20"
      chain_id: 56
      token_address: "TODO_TOKEN_ADDRESS"
      receiver_address: "TODO_RECEIVER_ADDRESS"
      decimals: 18
      is_default: true
      note: "推荐使用 BEP20，手续费更低"
    - method: "USDT"
      network: "ERC20"
      chain_id: 1
      token_address: "TODO_TOKEN_ADDRESS"
      receiver_address: "TODO_RECEIVER_ADDRESS"
      decimals: 6
      is_default: false
      note: "ERC20 主网 USDT，适合从以太坊主网付款"
    - method: "USDT"
      network: "TRC20"
      chain_id: 728126428
      token_address: "TODO_TOKEN_ADDRESS"
      receiver_address: "TODO_RECEIVER_ADDRESS"
      decimals: 6
      is_default: false
      note: "TRC20 主网 USDT，手续费低；提交交易哈希后系统自动链上确认，无需人工审核"
  plans:
    basic_monthly:
      name: "Basic"
      amount: "8"
      currency: "USDT"
      period_days: 30
      description: "Full automation for one month."
      features:
        - "Auto Post + Auto Reply + Auto DM"
        - "Priority queue"
